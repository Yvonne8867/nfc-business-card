<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Yvonne｜電子名片</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      color-scheme: dark;
      --bg: #101318;
      --panel: #181d24;
      --panel-soft: #202733;
      --text: #f7f9fc;
      --muted: #aeb8c7;
      --accent: #73d4c8;
      --accent-strong: #b7fff5;
      --line: rgba(255, 255, 255, 0.12);
      --shadow: rgba(0, 0, 0, 0.42);
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(28, 34, 44, 0.82), rgba(16, 19, 24, 1) 360px),
        var(--bg);
      color: var(--text);
      font-family: Arial, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.25;
      letter-spacing: 0;
      font-weight: 700;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
    }

    .tabs {
      display: flex;
      justify-content: center;
      margin: 0 auto 24px;
    }

    [role="tablist"] {
      display: inline-flex;
      width: min(100%, 360px);
      padding: 4px;
      gap: 4px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    [role="tab"] {
      flex: 1 1 0;
      min-height: 44px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font: inherit;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0;
      transition: background-color 160ms ease, color 160ms ease, box-shadow 160ms ease;
    }

    [role="tab"]:hover {
      color: var(--text);
    }

    [role="tab"]:focus-visible {
      outline: 2px solid var(--accent-strong);
      outline-offset: 3px;
    }

    [role="tab"][aria-selected="true"] {
      background: linear-gradient(180deg, rgba(115, 212, 200, 0.24), rgba(115, 212, 200, 0.13));
      color: var(--accent-strong);
      box-shadow:
        0 0 0 1px rgba(115, 212, 200, 0.38),
        0 8px 22px rgba(0, 0, 0, 0.22);
    }

    .stage {
      display: grid;
      justify-items: center;
    }

    [role="tabpanel"] {
      width: 100%;
      opacity: 1;
      animation: fade-in 180ms ease;
    }

    [role="tabpanel"][hidden] {
      display: none;
    }

    .card-frame {
      width: min(100%, 980px);
      margin: 0 auto;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      background: var(--panel);
      box-shadow: 0 22px 56px var(--shadow);
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 6px;
      background: #ffffff;
    }

    @keyframes fade-in {
      from {
        opacity: 0.68;
      }
      to {
        opacity: 1;
      }
    }

    @media (max-width: 640px) {
      main {
        width: min(100% - 24px, 1120px);
        padding: 32px 0;
      }

      h1 {
        font-size: 26px;
      }

      .subtitle {
        font-size: 15px;
      }

      [role="tablist"] {
        width: min(100%, 320px);
      }

      [role="tab"] {
        min-height: 48px;
      }

      .card-frame {
        padding: 7px;
        border-radius: 8px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header class="header">
      <h1 id="pageTitle">Yvonne｜電子名片</h1>
      <p id="pageSubtitle" class="subtitle">請選擇語言版本</p>
    </header>

    <div class="tabs">
      <div role="tablist" aria-label="名片語言版本">
        <button
          type="button"
          role="tab"
          id="tab-zh"
          aria-selected="true"
          aria-controls="panel-zh"
          tabindex="0"
          data-tab="zh"
        >
          中文版
        </button>
        <button
          type="button"
          role="tab"
          id="tab-en"
          aria-selected="false"
          aria-controls="panel-en"
          tabindex="-1"
          data-tab="en"
        >
          English
        </button>
      </div>
    </div>

    <section class="stage">
      <div
        role="tabpanel"
        id="panel-zh"
        aria-labelledby="tab-zh"
        tabindex="0"
      >
        <div class="card-frame">
          <img src="./assets/front.jpg" alt="Yvonne中文電子名片">
        </div>
      </div>

      <div
        role="tabpanel"
        id="panel-en"
        aria-labelledby="tab-en"
        tabindex="0"
        hidden
      >
        <div class="card-frame">
          <img src="./assets/back.jpg" alt="Yvonne LI English business card">
        </div>
      </div>
    </section>
  </main>

  <script>
    const tabs = Array.from(document.querySelectorAll('[role="tab"]'));
    const panels = Array.from(document.querySelectorAll('[role="tabpanel"]'));
    const pageTitle = document.getElementById('pageTitle');
    const pageSubtitle = document.getElementById('pageSubtitle');

    const pageCopy = {
      zh: {
        title: 'Yvonne｜電子名片',
        subtitle: '請選擇語言版本',
        documentTitle: 'Yvonne｜電子名片'
      },
      en: {
        title: 'Yvonne LI | Business Card',
        subtitle: 'Please select a language version',
        documentTitle: 'Yvonne LI | Business Card'
      }
    };

    function updatePageCopy(lang) {
      const copy = pageCopy[lang];
      if (!copy) return;

      pageTitle.textContent = copy.title;
      pageSubtitle.textContent = copy.subtitle;
      document.title = copy.documentTitle;
      document.documentElement.lang = lang === 'en' ? 'en' : 'zh-Hant';
    }

    function activateTab(tab, shouldFocus = true) {
      tabs.forEach((item) => {
        const isActive = item === tab;
        item.setAttribute('aria-selected', String(isActive));
        item.tabIndex = isActive ? 0 : -1;
      });

      panels.forEach((panel) => {
        panel.hidden = panel.id !== tab.getAttribute('aria-controls');
      });

      updatePageCopy(tab.dataset.tab);

      if (shouldFocus) {
        tab.focus();
      }
    }

    tabs.forEach((tab, index) => {
      tab.addEventListener('click', () => activateTab(tab, false));

      tab.addEventListener('keydown', (event) => {
        const key = event.key;
        const lastIndex = tabs.length - 1;
        let nextIndex = index;

        if (key === 'ArrowRight') {
          nextIndex = index === lastIndex ? 0 : index + 1;
        } else if (key === 'ArrowLeft') {
          nextIndex = index === 0 ? lastIndex : index - 1;
        } else if (key === 'Home') {
          nextIndex = 0;
        } else if (key === 'End') {
          nextIndex = lastIndex;
        } else if (key === 'Enter' || key === ' ') {
          event.preventDefault();
          activateTab(tab);
          return;
        } else {
          return;
        }

        event.preventDefault();
        activateTab(tabs[nextIndex]);
      });
    });

    activateTab(document.getElementById('tab-zh'), false);
  </script>
</body>
</html>
